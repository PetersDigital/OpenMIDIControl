---
# .github/dependabot.yml
version: 2

updates:
  # Monitor GitHub Actions for security updates
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
      day: "sunday"
      time: "04:00"
      timezone: "Asia/Kolkata"
    groups:
      actions-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      actions-major:
        patterns: ["*"]
        update-types: ["major"]
    commit-message:
      prefix: "ci(actions)"

  # Monitor Flutter/Dart dependencies
  - package-ecosystem: "pub"
    directory: "/app"
    schedule:
      interval: "monthly"
      day: "sunday"
      time: "04:00"
      timezone: "Asia/Kolkata"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
      major-updates:
        patterns: ["*"]
        update-types: ["major"]
    commit-message:
      prefix: "chore(deps)"
