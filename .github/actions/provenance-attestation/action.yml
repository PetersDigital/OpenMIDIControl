name: 'CD: Provenance Attestation'
description: 'Run GitHub attest-build-provenance for an artifact path.'
inputs:
  subject_path:
    description: 'Glob or exact path for artifact subjects.'
    required: true
runs:
  using: composite
  steps:
    - name: Generate provenance attestation
      uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.0
      with:
        subject-path: "${{ inputs.subject_path }}"
