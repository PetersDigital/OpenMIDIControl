name: 'CD: Notify Telegram'
description: 'Send formatted notification messages to Telegram'

inputs:
  telegram-token:
    description: 'Telegram Bot Token'
    required: true
  telegram-chat-id:
    description: 'Telegram Chat ID'
    required: true
  notification-type:
    description: 'Type of notification: ci-failure, release, dev-build'
    required: true
  tag:
    description: 'Release tag (for release notifications)'
    required: false
  branch:
    description: 'Branch name (for dev/CI notifications)'
    required: false
  commit:
    description: 'Commit SHA (optional, defaults to github.sha)'
    required: false
  status:
    description: 'Status: success or failure'
    required: false
    default: 'success'
  custom-message:
    description: 'Custom message text (overrides templates)'
    required: false
  artifact-path:
    description: 'Path to artifact file to send (for dev builds)'
    required: false
  changelog:
    description: 'Changelog text (for dev build captions)'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Send Telegram Notification
      shell: bash
      env:
        TELEGRAM_TOKEN: ${{ inputs.telegram-token }}
        TELEGRAM_CHAT_ID: ${{ inputs.telegram-chat-id }}
      run: |
        SERVER_URL="${{ github.server_url }}"
        REPO="${{ github.repository }}"
        RUN_ID="${{ github.run_id }}"
        COMMIT="${{ inputs.commit }}"
        if [ -z "$COMMIT" ]; then
          COMMIT="${GITHUB_SHA}"
        fi
        SHORT_COMMIT="${COMMIT:0:7}"

        escape_html() {
          echo "$1" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'
        }

        SAFE_BRANCH=$(escape_html "${{ inputs.branch }}")
        SAFE_TAG=$(escape_html "${{ inputs.tag }}")
        SAFE_CHANGELOG=$(escape_html "${{ inputs.changelog }}")
        SAFE_REF_NAME=$(escape_html "${{ github.ref_name }}")

        # Function to send with retry
        send_with_retry() {
          local url="$1"
          local data="$2"
          local max_retries=3
          local retry_count=0
          local http_code=0

          while [ $retry_count -lt $max_retries ]; do
            HTTP_CODE=$(curl -s -w "%{http_code}" -X POST "$url" $data)

            if [ "$HTTP_CODE" -eq 200 ]; then
              return 0
            fi

            retry_count=$((retry_count + 1))
            if [ $retry_count -lt $max_retries ]; then
              echo "⚠️  Telegram API request failed (HTTP $HTTP_CODE), retrying ($retry_count/$max_retries)..."
              sleep 2
            fi
          done

          echo "::warning::Telegram notification failed after $max_retries attempts (HTTP $HTTP_CODE)"
          return 1
        }

        if [ "${{ inputs.notification-type }}" = "ci-failure" ]; then
          MESSAGE=$(printf '❌ <b>CI Pipeline Failed</b>\n\n🌿 <b>Branch:</b> %s\n🔖 <b>Commit:</b> <a href="%s/%s/commit/%s">%s</a>\n\n⚠️ <i>Analyze or Test job failed.</i>\n\n🔗 <a href="%s/%s/actions/runs/%s">View Workflow Logs</a>' "$SAFE_REF_NAME" "$SERVER_URL" "$REPO" "$COMMIT" "$SHORT_COMMIT" "$SERVER_URL" "$REPO" "$RUN_ID")

          send_with_retry \
            "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
            "-d chat_id=\"$TELEGRAM_CHAT_ID\" -d parse_mode=\"HTML\" -d disable_web_page_preview=\"true\" --data-urlencode \"text=$MESSAGE\""

        elif [ "${{ inputs.notification-type }}" = "release" ]; then
          RELEASE_URL="$SERVER_URL/$REPO/releases/tag/${{ inputs.tag }}"
          RUN_URL="$SERVER_URL/$REPO/actions/runs/$RUN_ID"
          STATUS="${{ inputs.status }}"

          if [ "$STATUS" = "success" ]; then
            MESSAGE=$(printf '🚀 <b>OpenMIDIControl %s is live!</b>\n\n📦 <a href="%s">View Release &amp; Patch Notes</a>\n\n✅ <i>Deployment completed successfully with keyless signatures and SLSA provenance.</i>' "$SAFE_TAG" "$RELEASE_URL")
          else
            MESSAGE=$(printf '❌ <b>OpenMIDIControl %s release failed.</b>\n\n⚠️ <i>Pipeline encountered an error.</i>\n\n🔗 <a href="%s">View Workflow Logs</a>' "$SAFE_TAG" "$RUN_URL")
          fi

          send_with_retry \
            "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
            "-d chat_id=\"$TELEGRAM_CHAT_ID\" -d parse_mode=\"HTML\" -d disable_web_page_preview=\"true\" --data-urlencode \"text=$MESSAGE\""

        elif [ "${{ inputs.notification-type }}" = "dev-build" ]; then
          STATUS="${{ inputs.status }}"

          if [ "$STATUS" = "success" ] && [ -n "${{ inputs.artifact-path }}" ]; then
            CAPTION=$(printf '🛠 <b>Dev Build Ready</b>\n\n🌿 <b>Branch:</b> %s\n🔖 <b>Commit:</b> <a href="%s/%s/commit/%s">%s</a>\n\n📝 <b>Changes:</b>\n%s\n\n⬇️ <i>Artifact attached below</i>' "$SAFE_BRANCH" "$SERVER_URL" "$REPO" "$COMMIT" "$SHORT_COMMIT" "$SAFE_CHANGELOG")

            curl -F chat_id="$TELEGRAM_CHAT_ID" \
                 -F document=@"${{ inputs.artifact-path }}" \
                 -F parse_mode="HTML" \
                 -F disable_web_page_preview="true" \
                 --form-string caption="$CAPTION" \
                 "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendDocument" || \
              echo "::warning::Telegram document upload failed"
          else
            MESSAGE=$(printf '❌ <b>Dev Build Failed</b>\n\n🌿 <b>Branch:</b> %s\n🔖 <b>Commit:</b> %s\n\n🔗 <a href="%s/%s/actions/runs/%s">View Workflow Logs</a>' "$SAFE_BRANCH" "$SHORT_COMMIT" "$SERVER_URL" "$REPO" "$RUN_ID")

            send_with_retry \
              "https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage" \
              "-d chat_id=\"$TELEGRAM_CHAT_ID\" -d parse_mode=\"HTML\" -d disable_web_page_preview=\"true\" --data-urlencode \"text=$MESSAGE\""
          fi
        fi
