---
name: 'CD: Notify Telegram'
description: 'Send formatted notification messages to Telegram'

inputs:
  telegram-token:
    description: 'Telegram Bot Token'
    required: true
  telegram-chat-id:
    description: 'Telegram Chat ID'
    required: true
  notification-type:
    description: 'Type of notification: ci-failure, release, dev-build, beta-build, rc-build, build-skipped'
    required: true
  tag:
    description: 'Release tag (for release notifications)'
    required: false
  branch:
    description: 'Branch name (for dev/CI notifications)'
    required: false
  commit:
    description: 'Commit SHA (optional, defaults to github.sha)'
    required: false
  status:
    description: 'Status: success or failure'
    required: false
    default: 'success'
  custom-message:
    description: 'Custom message text (overrides templates)'
    required: false
  artifact-path:
    description: 'Path to artifact file to send (for dev builds)'
    required: false
  changelog:
    description: 'Changelog text (for dev build captions)'
    required: false
  release_reason:
    description: 'Reason for release (from check-release-markers)'
    required: false
  skip_reason:
    description: 'Reason for skipping release (from check-release-markers)'
    required: false
  patch_number:
    description: 'Patch number (for hotfix notifications)'
    required: false
  base_version:
    description: 'Base version (for hotfix notifications)'
    required: false
  rc_number:
    description: 'RC number (for release candidate notifications)'
    required: false
  is_first_rc:
    description: 'Whether this is the first RC (true/false)'
    required: false
  actor:
    description: 'GitHub username who triggered the action (optional, defaults to github.actor)'
    required: false

runs:
  using: 'composite'
  steps:
    - name: Send Telegram Notification
      shell: bash
      env:
        TELEGRAM_TOKEN: ${{ inputs.telegram-token }}
        TELEGRAM_CHAT_ID: ${{ inputs.telegram-chat-id }}
      run: |
        SERVER_URL="${{ github.server_url }}"
        REPO="${{ github.repository }}"
        RUN_ID="${{ github.run_id }}"
        RUN_URL="$SERVER_URL/$REPO/actions/runs/$RUN_ID"
        COMMIT="${{ inputs.commit }}"
        ACTOR="${{ inputs.actor }}"
        if [ -z "$COMMIT" ]; then
          COMMIT="${GITHUB_SHA}"
        fi
        if [ -z "$ACTOR" ]; then
          ACTOR="${GITHUB_ACTOR}"
        fi
        SHORT_COMMIT="${COMMIT:0:7}"

        # Escape HTML special characters
        escape_html() {
          local input="$1"
          input="${input//&/&amp;}"
          input="${input//</&lt;}"
          input="${input//>/&gt;}"
          printf '%s' "$input"
        }

        SAFE_BRANCH=$(escape_html "${{ inputs.branch }}")
        SAFE_TAG=$(escape_html "${{ inputs.tag }}")
        SAFE_CHANGELOG=$(escape_html "${{ inputs.changelog }}")
        SAFE_REF_NAME=$(escape_html "${{ github.ref_name }}")
        SAFE_ACTOR=$(escape_html "$ACTOR")
        SAFE_SKIP_REASON=$(escape_html "${{ inputs.skip_reason }}")

        SEND_URL="https://api.telegram.org/bot$TELEGRAM_TOKEN/sendMessage"

        # Simple send function matching proven working approach
        send_message() {
          local message="$1"
          
          curl -s -X POST "$SEND_URL" \
            -d "chat_id=$TELEGRAM_CHAT_ID" \
            -d "parse_mode=HTML" \
            -d "disable_web_page_preview=true" \
            --data-urlencode "text=$message" || echo "::warning::Telegram notification failed"
        }

        # Handle custom message
        if [ -n "${{ inputs.custom-message }}" ]; then
          send_message "${{ inputs.custom-message }}"
          exit 0
        fi

        # Notification types
        if [ "${{ inputs.notification-type }}" = "ci-failure" ]; then
          MESSAGE=$(printf '%s\n\n%s\n%s\n%s\n\n%s\n\n%s' \
            '<b>OpenMIDIControl CI Pipeline Failed</b>' \
            "<b>Branch:</b> $SAFE_REF_NAME" \
            "<b>Commit:</b> <a href=\"$SERVER_URL/$REPO/commit/$COMMIT\">$SHORT_COMMIT</a>" \
            "<b>By:</b> @$SAFE_ACTOR" \
            "<i>Workflow $GITHUB_WORKFLOW failed.</i>" \
            "<a href=\"$RUN_URL\">View Workflow Logs</a>")

          send_message "$MESSAGE"

        elif [ "${{ inputs.notification-type }}" = "rc-build" ]; then
          RELEASE_URL="$SERVER_URL/$REPO/releases/tag/${{ inputs.tag }}"
          STATUS="${{ inputs.status }}"

          if [ "$STATUS" = "success" ]; then
            MESSAGE=$(printf '%s\n\n%s\n%s\n\n%s\n\n%s' \
              "<b>OpenMIDIControl $SAFE_TAG RC Build Ready!</b>" \
              "<b>Branch:</b> $SAFE_BRANCH" \
              "<b>By:</b> @$SAFE_ACTOR" \
              "<a href=\"$RELEASE_URL\">View Release &amp; Patch Notes</a>" \
              '<i>Build completed successfully with keyless signatures and SLSA provenance.</i>')
          else
            MESSAGE=$(printf '%s\n\n%s\n%s\n\n%s\n\n%s' \
              "<b>OpenMIDIControl $SAFE_TAG RC Build Failed</b>" \
              "<b>Branch:</b> $SAFE_BRANCH" \
              "<b>By:</b> @$SAFE_ACTOR" \
              "<i>Workflow $GITHUB_WORKFLOW failed.</i>" \
              "<a href=\"$RUN_URL\">View Workflow Logs</a>")
          fi

          send_message "$MESSAGE"

        elif [ "${{ inputs.notification-type }}" = "build-skipped" ]; then
          MESSAGE=$(printf '%s\n\n%s\n%s\n\n%s' \
            '<b>OpenMIDIControl Build Skipped</b>' \
            "<b>Branch:</b> $SAFE_BRANCH" \
            "<b>By:</b> @$SAFE_ACTOR" \
            "<b>Reason:</b> $SAFE_SKIP_REASON")

          send_message "$MESSAGE"

        elif [ "${{ inputs.notification-type }}" = "release" ]; then
          RELEASE_URL="$SERVER_URL/$REPO/releases/tag/${{ inputs.tag }}"
          STATUS="${{ inputs.status }}"

          if [ -z "${{ inputs.tag }}" ]; then
            echo "::error::Tag input is empty for release notification"
            exit 1
          fi

          if [ "$STATUS" = "success" ]; then
            MESSAGE=$(printf '%s\n\n%s\n%s\n\n%s\n\n%s' \
              "<b>OpenMIDIControl $SAFE_TAG is Live!</b>" \
              "<b>Tag:</b> $SAFE_TAG" \
              "<b>By:</b> @$SAFE_ACTOR" \
              "<a href=\"$RELEASE_URL\">View Release &amp; Patch Notes</a>" \
              '<i>Deployment completed successfully with keyless signatures and SLSA provenance.</i>')
          else
            MESSAGE=$(printf '%s\n\n%s\n%s\n\n%s\n\n%s' \
              "<b>OpenMIDIControl $SAFE_TAG Release Failed</b>" \
              "<b>Tag:</b> $SAFE_TAG" \
              "<b>By:</b> @$SAFE_ACTOR" \
              "<i>Workflow $GITHUB_WORKFLOW failed.</i>" \
              "<a href=\"$RUN_URL\">View Workflow Logs</a>")
          fi

          send_message "$MESSAGE"

        elif [ "${{ inputs.notification-type }}" = "hotfix-release" ]; then
          STATUS="${{ inputs.status }}"
          PATCH_NUM="${{ inputs.patch_number }}"
          BASE_VER="${{ inputs.base_version }}"
          TAG="${{ inputs.tag }}"

          if [ "$STATUS" = "success" ]; then
            RELEASE_URL="$SERVER_URL/$REPO/releases/tag/$TAG"
            MESSAGE=$(printf '%s\n\n%s\n%s\n%s\n\n%s\n\n%s' \
              "<b>OpenMIDIControl Hotfix $SAFE_TAG Released!</b>" \
              "<b>Base Version:</b> $BASE_VER" \
              "<b>Patch:</b> $PATCH_NUM" \
              "<b>By:</b> @$SAFE_ACTOR" \
              "<a href=\"$RELEASE_URL\">View Release Notes</a>" \
              '<i>Hotfix deployed with keyless signatures and SLSA provenance.</i>')
          else
            MESSAGE=$(printf '%s\n\n%s\n%s\n%s\n\n%s\n\n%s' \
              "<b>OpenMIDIControl Hotfix $SAFE_TAG Failed</b>" \
              "<b>Base Version:</b> $BASE_VER" \
              "<b>Patch:</b> $PATCH_NUM" \
              "<b>By:</b> @$SAFE_ACTOR" \
              "<i>Workflow $GITHUB_WORKFLOW failed.</i>" \
              "<a href=\"$RUN_URL\">View Workflow Logs</a>")
          fi

          send_message "$MESSAGE"

        elif [ "${{ inputs.notification-type }}" = "dev-build" ]; then
          STATUS="${{ inputs.status }}"

          if [ "$STATUS" = "success" ]; then
            ARTIFACTS_URL="$SERVER_URL/$REPO/actions/runs/$RUN_ID"
            MESSAGE=$(printf '%s\n\n%s\n%s\n%s\n\n%s\n\n%s' \
              '<b>OpenMIDIControl Dev Build Ready</b>' \
              "<b>Branch:</b> $SAFE_BRANCH" \
              "<b>Commit:</b> <a href=\"$SERVER_URL/$REPO/commit/$COMMIT\">$SHORT_COMMIT</a>" \
              "<b>By:</b> @$SAFE_ACTOR" \
              "<b>Changes:</b>" \
              "$SAFE_CHANGELOG")

            send_message "$MESSAGE"
            send_message "📦 <a href=\"$ARTIFACTS_URL\">Download Build Artifacts</a>"
          else
            MESSAGE=$(printf '%s\n\n%s\n%s\n%s\n\n%s\n\n%s' \
              '<b>OpenMIDIControl Dev Build Failed</b>' \
              "<b>Branch:</b> $SAFE_BRANCH" \
              "<b>Commit:</b> <a href=\"$SERVER_URL/$REPO/commit/$COMMIT\">$SHORT_COMMIT</a>" \
              "<b>By:</b> @$SAFE_ACTOR" \
              "<i>Workflow $GITHUB_WORKFLOW failed.</i>" \
              "<a href=\"$RUN_URL\">View Workflow Logs</a>")

            send_message "$MESSAGE"
          fi

        elif [ "${{ inputs.notification-type }}" = "beta-build" ]; then
          STATUS="${{ inputs.status }}"
          TAG="${{ inputs.tag }}"

          if [ "$STATUS" = "success" ]; then
            ARTIFACTS_URL="$SERVER_URL/$REPO/actions/runs/$RUN_ID"
            MESSAGE=$(printf '%s\n\n%s\n%s\n%s\n\n%s\n\n%s' \
              "<b>OpenMIDIControl $SAFE_TAG Beta Available!</b>" \
              "<b>Branch:</b> $SAFE_BRANCH" \
              "<b>Commit:</b> <a href=\"$SERVER_URL/$REPO/commit/$COMMIT\">$SHORT_COMMIT</a>" \
              "<b>By:</b> @$SAFE_ACTOR" \
              "<b>Changes:</b>" \
              "$SAFE_CHANGELOG")

            send_message "$MESSAGE"
            send_message "📦 <a href=\"$ARTIFACTS_URL\">Download Beta Artifacts</a>\n\n<i>This is a beta release for testing. Please report any issues.</i>"
          else
            MESSAGE=$(printf '%s\n\n%s\n%s\n\n%s\n\n%s' \
              "<b>OpenMIDIControl $SAFE_TAG Beta Build Failed</b>" \
              "<b>Tag:</b> $SAFE_TAG" \
              "<b>By:</b> @$SAFE_ACTOR" \
              "<i>Workflow $GITHUB_WORKFLOW failed.</i>" \
              "<a href=\"$RUN_URL\">View Workflow Logs</a>")

            send_message "$MESSAGE"
          fi
        fi
