name: 'CD: Flutter Build Windows'
description: 'Build Flutter Windows application and create ZIP archive'

inputs:
  working-directory:
    description: 'Path to the Flutter project'
    required: true
    default: 'app'
  build-type:
    description: 'Build type: release, debug, or profile'
    required: false
    default: 'release'
  artifact-name:
    description: 'Custom name for the output ZIP (without .zip extension)'
    required: false

outputs:
  zip-path:
    description: 'Path to the created ZIP archive'
    value: ${{ steps.zip.outputs.zip-path }}
  zip-name:
    description: 'Name of the ZIP file'
    value: ${{ steps.zip.outputs.zip-name }}

runs:
  using: 'composite'
  steps:
    - uses: subosito/flutter-action@61a25ed2e61a6198a8a0e6a7ea1f7a1e8b7f0d2a  # v2.12.0
      with:
        channel: stable
        cache: true

    - name: Flutter Get Dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: flutter pub get

    - name: Build Windows
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: flutter build windows --${{ inputs.build-type }}

    - name: Create ZIP Archive
      id: zip
      shell: pwsh
      run: |
        $config = "${{ inputs.build-type }}".Substring(0,1).ToUpper() + "${{ inputs.build-type }}".Substring(1).ToLower()
        $sourceDir = "${{ github.workspace }}/${{ inputs.working-directory }}/build/windows/x64/runner/$config"

        if (-not (Test-Path $sourceDir)) {
          Write-Error "Source directory not found: $sourceDir"
          exit 1
        }

        $zipName = if ("${{ inputs.artifact-name }}" -ne "") { "${{ inputs.artifact-name }}.zip" } else { "windows-build.zip" }
        $zipPath = "${{ github.workspace }}/${{ inputs.working-directory }}/$zipName"

        Compress-Archive -Path "$sourceDir/*" -DestinationPath $zipPath -Force

        # Validate ZIP size (minimum 20MB for Windows builds)
        $minSizeMB = 20
        $actualSizeBytes = (Get-Item $zipPath).Length
        $actualSizeMB = [math]::Floor($actualSizeBytes / 1MB)

        if ($actualSizeMB -lt $minSizeMB) {
          Write-Error "ZIP size (${actualSizeMB}MB) is below minimum (${minSizeMB}MB). Build may be incomplete or corrupted."
          Write-Error "This could indicate missing assets, incomplete compilation, or packaging issues."
          exit 1
        }

        Write-Host "✅ ZIP validation passed: ${actualSizeMB}MB"

        $absPath = Resolve-Path $zipPath
        echo "zip-path=$absPath" >> $env:GITHUB_OUTPUT
        echo "zip-name=$zipName" >> $env:GITHUB_OUTPUT
