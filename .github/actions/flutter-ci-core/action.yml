name: 'CI: Flutter Core'
description: 'Shared setup, analysis, and testing logic'

inputs:
  working-directory:
    description: 'Path to the flutter project'
    required: true
    default: 'app'
  flutter-version:
    description: 'Flutter version to use (optional, defaults to stable)'
    required: false
    default: 'stable'
  telegram-token:
    description: 'Telegram Bot Token'
    required: false
  telegram-chat-id:
    description: 'Telegram Chat ID'
    required: false

outputs:
  has_windows:
    description: 'Whether the windows folder exists'
    value: ${{ steps.windows_check.outputs.has_windows }}

runs:
  using: 'composite'
  steps:
    - name: Cache Gradle
      uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9  # v4.0.2
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Cache Pub
      uses: actions/cache@0c45773b623bea8c8e75f6c82b208c3cf94ea4f9  # v4.0.2
      with:
        path: ~/.pub-cache
        key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-pub-

    - name: Check Windows Support
      id: windows_check
      shell: bash
      run: |
        if [ -d "${{ inputs.working-directory }}/windows" ]; then
          echo "has_windows=true" >> "$GITHUB_OUTPUT"
        else
          echo "has_windows=false" >> "$GITHUB_OUTPUT"
        fi

    - name: Setup Flutter
      uses: subosito/flutter-action@61a25ed2e61a6198a8a0e6a7ea1f7a1e8b7f0d2a  # v2.12.0
      with:
        flutter-version: ${{ inputs.flutter-version }}
        channel: stable
        cache: true

    - name: Install Dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: flutter pub get

    - name: Static Analysis
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: flutter analyze --fatal-infos

    - name: Unit Tests
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: flutter test

    - name: Notify Failure to Telegram
      if: failure() && inputs.telegram-token != '' && inputs.telegram-chat-id != ''
      shell: bash
      run: |
        escape_html() {
          echo "$1" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'
        }
        
        SAFE_REF_NAME=$(escape_html "${{ github.ref_name }}")
        
        MESSAGE=$(printf '❌ <b>CI Pipeline Failed</b>\n\n🌿 <b>Branch:</b> %s\n🔖 <b>Commit:</b> <a href="%s/%s/commit/%s">%s</a>\n\n⚠️ <i>Analyze or Test job failed.</i>\n\n🔗 <a href="%s/%s/actions/runs/%s">View Workflow Logs</a>' "$SAFE_REF_NAME" "${{ github.server_url }}" "${{ github.repository }}" "${GITHUB_SHA}" "${GITHUB_SHA:0:7}" "${{ github.server_url }}" "${{ github.repository }}" "${{ github.run_id }}")
        
        curl -s -X POST "https://api.telegram.org/bot${{ inputs.telegram-token }}/sendMessage" \
             -d chat_id=${{ inputs.telegram-chat-id }} \
             -d parse_mode="HTML" \
             -d disable_web_page_preview="true" \
             --data-urlencode "text=$MESSAGE"
