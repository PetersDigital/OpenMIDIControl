# @description: Automated production release on version tag push with signing, provenance, and Telegram notifications
# @owner: @dencelkbabu
# @sla: Best-effort (no uptime guarantee)
# @cost-center: CI/CD
name: "CD: Automated Production Release"

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
    paths:
      - 'app/**'
      - '.github/**'
      - 'scripts/**'
      - 'pubspec.yaml'
      - '!**.md'
      - '!docs/**'

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  verify-tag-on-main:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      on_main: ${{ steps.validate.outputs.on_main }}
      has_windows: ${{ steps.validate.outputs.has_windows }}
      tag_commit: ${{ steps.validate.outputs.commit }}
      tag: ${{ steps.validate.outputs.tag }}
    steps:
      - name: Checkout Repository (workflow engine code)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: 'CD: Release Tag Validation'
        id: validate
        uses: ./.github/actions/release-tag-validation
        with:
          tag: ${{ github.ref_name }}
          gpg_public_key: ${{ secrets.GPG_PUBLIC_KEY }}
          expected_fingerprint: ${{ secrets.EXPECTED_GPG_FINGERPRINT }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          main_branch: main

  analyze-and-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    needs: verify-tag-on-main
    if: needs.verify-tag-on-main.outputs.on_main == 'true'
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Restore modern CI actions from main
        shell: bash
        working-directory: .
        run: |
          # Fetch the latest main branch from origin
          git fetch origin main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove any existing .github/actions (from old tags)
          rm -rf .github/actions

          # Checkout the .github/actions directory directly from the fetched main branch
          git checkout FETCH_HEAD -- .github/actions || {
            echo "::error::Failed to checkout .github/actions from main branch"
            exit 1
          }

          # Verify actions were restored
          if [ ! -d ".github/actions" ] || [ -z "$(ls -A .github/actions)" ]; then
            echo "::error::.github/actions is empty or missing"
            exit 1
          fi
      - name: 'CD: Runner CI Core'
        id: core
        uses: ./.github/actions/flutter-ci-core
        with:
          working-directory: app
          telegram-token: ${{ secrets.TELEGRAM_TOKEN }}
          telegram-chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}

  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs: [verify-tag-on-main, analyze-and-test]
    if: needs.verify-tag-on-main.outputs.on_main == 'true'
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore modern CI actions from main
        shell: bash
        working-directory: .
        run: |
          # Fetch the latest main branch from origin
          git fetch origin main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove any existing .github/actions (from old tags)
          rm -rf .github/actions

          # Checkout the .github/actions directory directly from the fetched main branch
          git checkout FETCH_HEAD -- .github/actions || {
            echo "::error::Failed to checkout .github/actions from main branch"
            exit 1
          }

          # Verify actions were restored
          if [ ! -d ".github/actions" ] || [ -z "$(ls -A .github/actions)" ]; then
            echo "::error::.github/actions is empty or missing"
            exit 1
          fi

      - name: Build Android APK
        id: build
        uses: ./.github/actions/flutter-build-android
        with:
          working-directory: app
          keystore-base64: ${{ secrets.KEYSTORE_BASE64 }}
          key-password: ${{ secrets.KEY_PASSWORD }}
          key-alias: ${{ secrets.KEY_ALIAS }}
          store-password: ${{ secrets.STORE_PASSWORD }}
          build-type: release
          artifact-name: openmidicontrol-${{ needs.verify-tag-on-main.outputs.tag }}-android

      - name: Install Cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0

      - name: 'CD: Cosign Sign and Verify'
        uses: ./.github/actions/cosign-sign-verify
        with:
          artifact_path: ${{ steps.build.outputs.apk-path }}
          repository: ${{ github.repository }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: android-apk
          retention-days: 1
          path: |
            ${{ steps.build.outputs.apk-path }}
            ${{ steps.build.outputs.apk-path }}.sig
            ${{ steps.build.outputs.apk-path }}.pem

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 25
    needs: [verify-tag-on-main, analyze-and-test]
    if: needs.verify-tag-on-main.outputs.on_main == 'true' && needs.verify-tag-on-main.outputs.has_windows == 'true'
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore modern CI actions from main
        shell: bash
        working-directory: .
        run: |
          # Fetch the latest main branch from origin
          git fetch origin main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove any existing .github/actions (from old tags)
          rm -rf .github/actions

          # Checkout the .github/actions directory directly from the fetched main branch
          git checkout FETCH_HEAD -- .github/actions || {
            echo "::error::Failed to checkout .github/actions from main branch"
            exit 1
          }

          # Verify actions were restored
          if [ ! -d ".github/actions" ] || [ -z "$(ls -A .github/actions)" ]; then
            echo "::error::.github/actions is empty or missing"
            exit 1
          fi

      - name: Build Windows ZIP
        id: build
        uses: ./.github/actions/flutter-build-windows
        with:
          working-directory: app
          build-type: release
          artifact-name: openmidicontrol-${{ needs.verify-tag-on-main.outputs.tag }}-windows

      - name: Install Cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0

      - name: 'CD: Cosign Sign and Verify'
        uses: ./.github/actions/cosign-sign-verify
        with:
          artifact_path: ${{ steps.build.outputs.zip-path }}
          repository: ${{ github.repository }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-build
          retention-days: 1
          path: |
            ${{ steps.build.outputs.zip-path }}
            ${{ steps.build.outputs.zip-path }}.sig
            ${{ steps.build.outputs.zip-path }}.pem

  provenance:
    needs: [verify-tag-on-main, build-android, build-windows]
    timeout-minutes: 10
    if: |
      always() &&
      needs.verify-tag-on-main.outputs.on_main == 'true' &&
      needs.build-android.result == 'success' &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped')
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore modern CI actions from main
        shell: bash
        working-directory: .
        run: |
          # Fetch the latest main branch from origin
          git fetch origin main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove any existing .github/actions (from old tags)
          rm -rf .github/actions

          # Checkout the .github/actions directory directly from the fetched main branch
          git checkout FETCH_HEAD -- .github/actions || {
            echo "::error::Failed to checkout .github/actions from main branch"
            exit 1
          }

          # Verify actions were restored
          if [ ! -d ".github/actions" ] || [ -z "$(ls -A .github/actions)" ]; then
            echo "::error::.github/actions is empty or missing"
            exit 1
          fi

      - name: Download Artifacts
        uses: ./.github/actions/download-and-prepare-artifacts

      - name: Generate Provenance (Android)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: openmidicontrol-*-android.apk

      - name: Generate Provenance (Windows)
        if: needs.build-windows.result == 'success'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: openmidicontrol-*-windows.zip

  publish-release:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [verify-tag-on-main, build-android, build-windows, provenance]
    if: |
      always() &&
      needs.verify-tag-on-main.outputs.on_main == 'true' &&
      needs.build-android.result == 'success' &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') &&
      needs.provenance.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore modern CI actions from main
        shell: bash
        working-directory: .
        run: |
          # Fetch the latest main branch from origin
          git fetch origin main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove any existing .github/actions (from old tags)
          rm -rf .github/actions

          # Checkout the .github/actions directory directly from the fetched main branch
          git checkout FETCH_HEAD -- .github/actions || {
            echo "::error::Failed to checkout .github/actions from main branch"
            exit 1
          }

          # Verify actions were restored
          if [ ! -d ".github/actions" ] || [ -z "$(ls -A .github/actions)" ]; then
            echo "::error::.github/actions is empty or missing"
            exit 1
          fi

      - name: Download Artifacts
        uses: ./.github/actions/download-and-prepare-artifacts

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded files ==="
          ls -la
          echo "========================"

      - name: Generate Release Notes
        uses: ./.github/actions/generate-release-notes
        with:
          tag: ${{ needs.verify-tag-on-main.outputs.tag }}
          changelog-path: CHANGELOG.md
          include-metadata: 'true'
          commit-hash: ${{ needs.verify-tag-on-main.outputs.tag_commit }}

      - name: Prepare release assets list
        id: assets
        run: |
          TAG="${{ needs.verify-tag-on-main.outputs.tag }}"
          FILES=""

          # Android APK and signatures
          for ext in apk sig pem; do
            FILE="openmidicontrol-${TAG}-android.${ext}"
            if [ -f "$FILE" ]; then
              FILES="$FILES $FILE"
              echo "Found: $FILE"
            else
              echo "::warning::File not found: $FILE"
            fi
          done

          # Windows ZIP and signatures (if exists)
          if [ "${{ needs.verify-tag-on-main.outputs.has_windows }}" = "true" ]; then
            for ext in zip sig pem; do
              FILE="openmidicontrol-${TAG}-windows.${ext}"
              if [ -f "$FILE" ]; then
                FILES="$FILES $FILE"
                echo "Found: $FILE"
              else
                echo "::warning::File not found: $FILE"
              fi
            done
          fi

          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          fail_on_unmatched_files: false
          body_path: release_notes.md
          draft: false
          files: ${{ steps.assets.outputs.files }}

  notify-release:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [verify-tag-on-main, publish-release]
    if: ${{ always() && needs.verify-tag-on-main.outputs.on_main == 'true' }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore modern CI actions from main
        shell: bash
        working-directory: .
        run: |
          # Fetch the latest main branch from origin
          git fetch origin main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove any existing .github/actions (from old tags)
          rm -rf .github/actions

          # Checkout the .github/actions directory directly from the fetched main branch
          git checkout FETCH_HEAD -- .github/actions || {
            echo "::error::Failed to checkout .github/actions from main branch"
            exit 1
          }

          # Verify actions were restored
          if [ ! -d ".github/actions" ] || [ -z "$(ls -A .github/actions)" ]; then
            echo "::error::.github/actions is empty or missing"
            exit 1
          fi

      - name: Notify Telegram
        uses: ./.github/actions/notify-telegram
        with:
          telegram-token: ${{ secrets.TELEGRAM_TOKEN }}
          telegram-chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          notification-type: release
          tag: ${{ needs.verify-tag-on-main.outputs.tag }}
          status: ${{ needs.publish-release.result }}
