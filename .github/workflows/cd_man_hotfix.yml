---
# @description: Builds hotfix/patch releases for urgent production fixes with signing, provenance, and public GitHub releases
# @owner: @dencelkbabu
# @sla: Best-effort (no uptime guarantee)
# @cost-center: CI/CD
name: "CD: Manual Hotfix Release"

on:
  push:
    tags:
      - 'v*-patch.*'

concurrency:
  group: hotfix-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  verify-patch-tag:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    if: github.actor != 'dependabot[bot]'
    outputs:
      patch_number: ${{ steps.parse_tag.outputs.patch_number }}
      base_version: ${{ steps.parse_tag.outputs.base_version }}
      is_first_patch: ${{ steps.parse_tag.outputs.is_first_patch }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Parse Patch Tag
        id: parse_tag
        run: |
          TAG="${{ github.ref_name }}"
          echo "Processing tag: $TAG"

          # Extract base version (e.g., v0.2.2 from v0.2.2-patch.1)
          BASE_VERSION="${TAG//-patch.[0-9]*}"
          echo "Base version: $BASE_VERSION"

          # Extract patch number
          PATCH_NUM=$(echo "$TAG" | grep -oP 'patch\.\K[0-9]+')
          echo "Patch number: $PATCH_NUM"

          # Determine if this is the first patch
          if [ "$PATCH_NUM" -eq 1 ]; then
            IS_FIRST_PATCH="true"
            echo "This is the first patch for $BASE_VERSION"
          else
            IS_FIRST_PATCH="false"
            echo "This is patch.$PATCH_NUM for $BASE_VERSION"
          fi

          {
            echo "base_version=$BASE_VERSION"
            echo "patch_number=$PATCH_NUM"
            echo "is_first_patch=$IS_FIRST_PATCH"
          } >> "$GITHUB_OUTPUT"

  analyze-and-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    if: github.actor != 'dependabot[bot]'
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: 'CI: Runner CI Core'
        id: core
        uses: ./.github/actions/flutter-ci-core
        with:
          working-directory: app
          telegram-token: ${{ secrets.TELEGRAM_TOKEN }}
          telegram-chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          notify-on-failure: 'false'

  build-hotfix:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs: [verify-patch-tag, analyze-and-test]
    if: always() && needs.analyze-and-test.result == 'success'
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
      id-token: write
    outputs:
      has_windows: ${{ steps.check_windows.outputs.has_windows }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check Windows Support
        id: check_windows
        run: |
          if [ -d "windows" ]; then
            echo "has_windows=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_windows=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Android APK
        id: build_android
        uses: ./.github/actions/flutter-build-android
        with:
          working-directory: app
          keystore-base64: ${{ secrets.KEYSTORE_BASE64 }}
          key-password: ${{ secrets.KEY_PASSWORD }}
          key-alias: ${{ secrets.KEY_ALIAS }}
          store-password: ${{ secrets.STORE_PASSWORD }}
          build-type: release
          artifact-name: openmidicontrol-${{ github.ref_name }}-android

      - name: Install Cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0

      - name: 'CD: Cosign Sign and Verify'
        uses: ./.github/actions/cosign-sign-verify
        with:
          artifact_path: ${{ steps.build_android.outputs.apk-path }}
          repository: ${{ github.repository }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: android-apk
          retention-days: 1
          path: |
            ${{ steps.build_android.outputs.apk-path }}
            ${{ steps.build_android.outputs.apk-path }}.sig
            ${{ steps.build_android.outputs.apk-path }}.pem

  build-hotfix-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    needs: [verify-patch-tag, analyze-and-test]
    if: always() && needs.analyze-and-test.result == 'success'
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check Windows Support
        id: check_windows
        run: |
          if [ -d "windows" ]; then
            echo "has_windows=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_windows=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Build Windows ZIP
        id: build_windows
        if: steps.check_windows.outputs.has_windows == 'true'
        uses: ./.github/actions/flutter-build-windows
        with:
          working-directory: app
          build-type: release
          artifact-name: openmidicontrol-${{ github.ref_name }}-windows

      - name: Install Cosign
        if: steps.check_windows.outputs.has_windows == 'true'
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0

      - name: 'CD: Cosign Sign and Verify (Windows)'
        if: steps.check_windows.outputs.has_windows == 'true'
        uses: ./.github/actions/cosign-sign-verify
        with:
          artifact_path: ${{ steps.build_windows.outputs.zip-path }}
          repository: ${{ github.repository }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: steps.check_windows.outputs.has_windows == 'true'
        with:
          name: windows-build
          retention-days: 1
          path: |
            ${{ steps.build_windows.outputs.zip-path }}
            ${{ steps.build_windows.outputs.zip-path }}.sig
            ${{ steps.build_windows.outputs.zip-path }}.pem

  provenance:
    needs: [verify-patch-tag, analyze-and-test, build-hotfix]
    timeout-minutes: 10
    if: always() && needs.build-hotfix.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Artifacts
        uses: ./.github/actions/download-and-prepare-artifacts

      - name: Generate Provenance (Android)
        uses: ./.github/actions/provenance-attestation
        with:
          subject_path: openmidicontrol-*-android.apk

      - name: Generate Provenance (Windows)
        if: needs.build-hotfix.outputs.has_windows == 'true'
        uses: ./.github/actions/provenance-attestation
        with:
          subject_path: openmidicontrol-*-windows.zip

  create-hotfix-release:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [verify-patch-tag, analyze-and-test, build-hotfix, provenance]
    if: always() && needs.build-hotfix.result == 'success' && needs.provenance.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: ./.github/actions/download-and-prepare-artifacts

      - name: Determine Changelog Range
        id: changelog_range
        run: |
          TAG="${{ github.ref_name }}"
          BASE_VERSION="${{ needs.verify-patch-tag.outputs.base_version }}"
          IS_FIRST_PATCH="${{ needs.verify-patch-tag.outputs.is_first_patch }}"

          echo "Tag: $TAG"
          echo "Base version: $BASE_VERSION"
          echo "Is first patch: $IS_FIRST_PATCH"

          if [ "$IS_FIRST_PATCH" = "true" ]; then
            # First patch: Show changes since stable release
            echo "Generating changelog since stable release"

            # Find stable tag
            LAST_STABLE=$(git describe --tags --match="$BASE_VERSION" --abbrev=0 2>/dev/null || echo "")

            if [ -n "$LAST_STABLE" ]; then
              {
                echo "from_ref=$LAST_STABLE"
                echo "changelog_type=since_stable"
              } >> "$GITHUB_OUTPUT"
              echo "Found stable: $LAST_STABLE"
            else
              # Fallback to previous tag
              PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
              {
                echo "from_ref=$PREV_TAG"
                echo "changelog_type=since_previous"
              } >> "$GITHUB_OUTPUT"
              echo "No stable tag found, using previous: $PREV_TAG"
            fi
          else
            # Subsequent patch: Show changes since previous patch
            echo "Generating changelog since previous patch"

            # Find previous patch tag
            PREV_PATCH=$(git tag --list 'v*-patch.*' | sort -V | grep -E "^${BASE_VERSION}-patch\." | tail -n 2 | head -n 1 || echo "")

            if [ -n "$PREV_PATCH" ]; then
              {
                echo "from_ref=$PREV_PATCH"
                echo "changelog_type=since_previous"
              } >> "$GITHUB_OUTPUT"
              echo "Found previous patch: $PREV_PATCH"
            else
              # Fallback to stable if no previous patch found
              LAST_STABLE=$(git describe --tags --match="$BASE_VERSION" --abbrev=0 2>/dev/null || echo "")
              {
                echo "from_ref=$LAST_STABLE"
                echo "changelog_type=since_stable"
              } >> "$GITHUB_OUTPUT"
              echo "No previous patch found, falling back to stable: $LAST_STABLE"
            fi
          fi

      - name: Generate Release Notes
        uses: ./.github/actions/generate-release-notes
        with:
          tag: ${{ github.ref_name }}
          changelog-path: CHANGELOG.md
          include-metadata: 'true'
          commit-hash: ${{ github.sha }}
          triggered-by: ${{ github.actor }}
          from-ref: ${{ steps.changelog_range.outputs.from_ref }}
          changelog-type: ${{ steps.changelog_range.outputs.changelog_type }}

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded files ==="
          ls -la
          echo "========================"

      - name: Prepare release assets list
        id: assets
        uses: ./.github/actions/prepare-release-assets
        with:
          tag: ${{ github.ref_name }}
          has-windows: ${{ needs.build-hotfix.outputs.has_windows }}

      - name: Create Public Hotfix Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }} - Hotfix
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: ${{ steps.assets.outputs.files }}

  notify-telegram:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [verify-patch-tag, analyze-and-test, build-hotfix, create-hotfix-release]
    if: always() && needs.build-hotfix.result == 'success'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Notify Telegram (Hotfix Release)
        uses: ./.github/actions/notify-telegram
        with:
          telegram-token: ${{ secrets.TELEGRAM_TOKEN }}
          telegram-chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          notification-type: hotfix-release
          branch: ${{ github.ref_name }}
          tag: ${{ github.ref_name }}
          status: ${{ needs.build-hotfix.result }}
          patch_number: ${{ needs.verify-patch-tag.outputs.patch_number }}
          base_version: ${{ needs.verify-patch-tag.outputs.base_version }}
