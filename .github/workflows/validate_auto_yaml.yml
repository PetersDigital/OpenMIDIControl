---
# @description: Validates YAML syntax and GitHub Actions workflow correctness on pushes and PRs
# @owner: @dencelkbabu
# @sla: Best-effort (no uptime guarantee)
# @cost-center: Validation
name: "Validate: GitHub Actions Workflows"

on:
  push:
    branches: [dev]
    paths:
      - '.github/**'
      - '!**/*.md'
      - '!.github/notify-telegram-HTMLCSS-preview/**'
  pull_request:
    branches: [dev, 'release/**', 'hotfix/**']
    paths:
      - '.github/**'
      - '!**/*.md'
      - '!.github/notify-telegram-HTMLCSS-preview/**'

concurrency:
  group: workflow-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  yaml-lint:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: YAML Lint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c  # v3.4.0
        with:
          file_or_dir: .github/workflows .github/actions
          config_file: .github/workflows/.yamllint

  actionlint:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Action Lint
        uses: rhysd/actionlint@914e7df21a07ef503a81201c76d2b11c789d3fca  # v1.7.12
        with:
          args: -color
