name: Release Build & Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  verify-tag-on-main:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      on_main: ${{ steps.check.outputs.on_main }}
      has_windows: ${{ steps.windows_check.outputs.has_windows }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tagged commit belongs to main
        id: check
        run: |
          git fetch origin main --depth=1
          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
            echo "Tag commit is on main."
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
            echo "Tag commit is not on main; build and deploy jobs will be skipped."
          fi

      - name: Check Windows Support
        id: windows_check
        run: if [ -d "app/windows" ]; then echo "has_windows=true" >> "$GITHUB_OUTPUT"; else echo "has_windows=false" >> "$GITHUB_OUTPUT"; fi

  analyze-and-test:
    runs-on: ubuntu-latest
    needs: verify-tag-on-main
    if: needs.verify-tag-on-main.outputs.on_main == 'true'
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get

      # Enforces Section 3 of AGENTS.md (Lints)
      - name: Static Analysis
        run: flutter analyze --fatal-infos

      - name: Unit Tests
        run: flutter test

  build-android:
    runs-on: ubuntu-latest
    needs: [verify-tag-on-main, analyze-and-test]
    if: needs.verify-tag-on-main.outputs.on_main == 'true'
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'gradle'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get

      # --- NEW STEP: Construct the Keystore from GitHub Secrets ---
      - name: Configure Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          # 1. Use printf to ensure the raw Base64 string is decoded correctly
          printf "%s" "$KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          
          # 2. Dynamically create the key.properties file
          # The storeFile path must be relative to the 'app/android/app' folder
          echo "storePassword=$STORE_PASSWORD" > android/key.properties
          echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
          echo "keyAlias=$KEY_ALIAS" >> android/key.properties
          echo "storeFile=upload-keystore.jks" >> android/key.properties  

      - run: flutter build apk --release

      - name: Rename APK
        run: |
          TAG=${GITHUB_REF_NAME}
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/openmidicontrol-${TAG}-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: app/build/app/outputs/flutter-apk/openmidicontrol-*-android.apk


  build-windows:
    runs-on: windows-latest
    needs: [verify-tag-on-main, analyze-and-test]
    if: needs.verify-tag-on-main.outputs.on_main == 'true' && needs.verify-tag-on-main.outputs.has_windows == 'true'
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build windows

      - name: Zip Windows Build
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "openmidicontrol-${tag}-windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: app/openmidicontrol-*-windows.zip


  publish-release:
    runs-on: ubuntu-latest
    needs: [verify-tag-on-main, build-android, build-windows]
    if: |
      always() &&
      needs.verify-tag-on-main.outputs.on_main == 'true' &&
      needs.build-android.result == 'success' &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Build release notes from CHANGELOG
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          awk -v version="$VERSION" '
            BEGIN { in_section=0 }
            index($0, "## [" version "]") == 1 { in_section=1; next }
            /^## \[/ && in_section==1 { exit }
            in_section==1 { print }
          ' CHANGELOG.md > changelog_section.md

          if [ ! -s changelog_section.md ]; then
            echo "Failed to find CHANGELOG entry for version ${VERSION}" >&2
            exit 1
          fi

          {
            echo "## What's Changed"
            echo
            cat changelog_section.md
            echo
            echo "## Release Notes Source"
            echo "- Full project changelog: [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md)"
          } > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: false
          body_path: release_notes.md
          files: |
            openmidicontrol-*-android.apk
            openmidicontrol-*-windows.zip


  notify-release:
    runs-on: ubuntu-latest
    needs: [verify-tag-on-main, publish-release]
    if: ${{ always() && needs.verify-tag-on-main.outputs.on_main == 'true' }}
    permissions:
      contents: read
    steps:
      - name: Notify Telegram
        run: |
          TAG="${GITHUB_REF_NAME}"
          RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${TAG}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          RELEASE_RESULT="${{ needs.publish-release.result }}"

          if [ "$RELEASE_RESULT" = "success" ]; then
            MESSAGE=$(printf '🚀 *OpenMIDIControl %s is live!*\n\n📦 Release: %s\n\n✅ Release deployment completed successfully.' "${TAG}" "${RELEASE_URL}")
          else
            MESSAGE=$(printf '❌ *OpenMIDIControl %s release pipeline failed.*\n\n🛠 Workflow logs: %s' "${TAG}" "${RUN_URL}")
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
                 -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
                 -d parse_mode="Markdown" \
                 --data-urlencode "text=${MESSAGE}"
