name: Release Build & Publish

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  verify-tag-on-main:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      on_main: ${{ steps.check.outputs.on_main }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify tagged commit belongs to main
        id: check
        run: |
          git fetch origin main --depth=1
          if git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"; then
            echo "on_main=true" >> "$GITHUB_OUTPUT"
            echo "Tag commit is on main."
          else
            echo "on_main=false" >> "$GITHUB_OUTPUT"
            echo "Tag commit is not on main; build and deploy jobs will be skipped."
          fi

  analyze-and-test:
    runs-on: ubuntu-latest
    needs: verify-tag-on-main
    if: needs.verify-tag-on-main.outputs.on_main == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get

      # Enforces Section 3 of AGENTS.md (Lints)
      - name: Static Analysis
        run: flutter analyze --fatal-infos

      - name: Unit Tests
        run: flutter test

  build-android:
    runs-on: ubuntu-latest
    needs: [verify-tag-on-main, analyze-and-test]
    if: needs.verify-tag-on-main.outputs.on_main == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release

      - name: Rename APK
        run: |
          TAG=${GITHUB_REF_NAME}
          mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/openmidicontrol-${TAG}-android.apk

      - uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/openmidicontrol-*-android.apk


  build-windows:
    runs-on: windows-latest
    needs: [verify-tag-on-main, analyze-and-test]
    if: needs.verify-tag-on-main.outputs.on_main == 'true'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows

      - name: Zip Windows Build
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF_NAME
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath "openmidicontrol-${tag}-windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: openmidicontrol-*-windows.zip


  publish-release:
    runs-on: ubuntu-latest
    needs: [verify-tag-on-main, build-android, build-windows]
    if: needs.verify-tag-on-main.outputs.on_main == 'true'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Build release notes from CHANGELOG
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"

          awk -v version="$VERSION" '
            BEGIN { in_section=0 }
            index($0, "## [" version "]") == 1 { in_section=1; next }
            /^## \[/ && in_section==1 { exit }
            in_section==1 { print }
          ' CHANGELOG.md > changelog_section.md

          if [ ! -s changelog_section.md ]; then
            echo "Failed to find CHANGELOG entry for version ${VERSION}" >&2
            exit 1
          fi

          {
            echo "## What's Changed"
            echo
            cat changelog_section.md
            echo
            echo "## Release Notes Source"
            echo "- Full project changelog: [CHANGELOG.md](https://github.com/${GITHUB_REPOSITORY}/blob/main/CHANGELOG.md)"
          } > release_notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            openmidicontrol-*-android.apk
            openmidicontrol-*-windows.zip


  notify-release:
    runs-on: ubuntu-latest
    needs: [verify-tag-on-main, publish-release]
    if: ${{ always() && needs.verify-tag-on-main.outputs.on_main == 'true' }}
    permissions:
      contents: read
    steps:
      - name: Notify Telegram
        run: |
          TAG="${GITHUB_REF_NAME}"
          RELEASE_URL="${{ github.server_url }}/${{ github.repository }}/releases/tag/${TAG}"
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          RELEASE_RESULT="${{ needs.publish-release.result }}"

          if [ "$RELEASE_RESULT" = "success" ]; then
            MESSAGE=$(printf '🚀 *OpenMIDIControl %s is live!*\n\n📦 Release: %s\n\n✅ Release deployment completed successfully.' "${TAG}" "${RELEASE_URL}")
          else
            MESSAGE=$(printf '❌ *OpenMIDIControl %s release pipeline failed.*\n\n🛠 Workflow logs: %s' "${TAG}" "${RUN_URL}")
          fi
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
               -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
               -d parse_mode="Markdown" \
               --data-urlencode "text=${MESSAGE}"
