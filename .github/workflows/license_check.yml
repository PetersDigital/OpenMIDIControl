# @description: Automated check for dual-license headers in all source files
# @owner: @dencelkbabu
# @sla: Best-effort (no uptime guarantee)
# @cost-center: CI/CD
name: License Header Check

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  license-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Check License Headers
        run: |
          chmod +x ./scripts/check_license_headers.sh
          ./scripts/check_license_headers.sh
