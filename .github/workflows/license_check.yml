name: License Header Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  license-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Check License Headers
        run: |
          chmod +x ./scripts/check_license_headers.sh
          ./scripts/check_license_headers.sh
