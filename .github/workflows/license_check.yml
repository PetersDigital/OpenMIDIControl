---
# @description: Automated check for dual-license headers in all source files
# @owner: @dencelkbabu
# @sla: Best-effort (no uptime guarantee)
# @cost-center: CI/CD
name: License Header Check

on:
  push:
    branches: [beta]
    paths:
      - '**'
      - '!**/*.md'
      - '!docs/**'
      - '!.github/notify-telegram-HTMLCSS-preview/**'
  pull_request:
    branches: [main, beta, 'release/**', 'hotfix/**']
    paths:
      - '**'
      - '!**/*.md'
      - '!docs/**'
      - '!.github/notify-telegram-HTMLCSS-preview/**'

concurrency:
  group: license-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  license-check:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    if: github.actor != 'dependabot[bot]'
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.11'

      - name: Check License Headers
        run: python scripts/check_license_headers.py
