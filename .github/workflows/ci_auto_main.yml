---
# @description: CI pipeline for main branch and pull requests with analysis, testing, and multi-platform builds
# @owner: @dencelkbabu
# @sla: Best-effort (no uptime guarantee)
# @cost-center: CI/CD
name: "CI: Auto Main Branch"

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/**'
      - 'scripts/**'
      - 'pubspec.yaml'
      - '!**.md'
      - '!docs/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - '.github/**'
      - 'scripts/**'
      - 'pubspec.yaml'
      - '!**.md'
      - '!docs/**'

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: 'CI: Dependency Review'
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4.9.0
        with:
          fail-on-severity: moderate
          deny-licenses: GPL-3.0, AGPL-3.0
          allow-ghsas: false

  analyze-and-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    strategy:
      matrix:
        flutter-version: ['3.41.0', '3.41.6']
      fail-fast: false
    outputs:
      has_windows: ${{ steps.core.outputs.has_windows }}
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: 'CI: Runner CI Core'
        id: core
        uses: ./.github/actions/flutter-ci-core
        with:
          working-directory: app
          flutter-version: ${{ matrix.flutter-version }}
          telegram-token: ${{ secrets.TELEGRAM_TOKEN }}
          telegram-chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}

  build-android:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs: analyze-and-test
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Build Android APK (debug)
        id: build_android
        uses: ./.github/actions/flutter-build-android
        with:
          working-directory: app
          build-type: debug
          artifact-name: openmidicontrol-debug-android
          key-alias: ''
          key-password: ''
          keystore-base64: ''
          store-password: ''

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 25
    needs: analyze-and-test
    if: github.event_name == 'push'
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: Check Windows Support
        id: check
        run: |
          if [ -d "windows" ]; then
            echo "has_windows=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_windows=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash
      - name: Build Windows (debug)
        if: steps.check.outputs.has_windows == 'true'
        uses: ./.github/actions/flutter-build-windows
        with:
          working-directory: app
          build-type: debug
          artifact-name: openmidicontrol-debug-windows
