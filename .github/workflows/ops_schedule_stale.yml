---
# @description: Mark stale issues and pull requests with no activity, exempting bug and security items
# @owner: @dencelkbabu
# @sla: Best-effort (no uptime guarantee)
# @cost-center: Operations
name: "Ops: Auto Stale Issue and PR Manager"

on:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: stale-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  stale:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Close Stale Issues and PRs
        uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f  # v10.2.0
        with:
          stale-issue-message: >
            This issue has been automatically marked as stale because it has not
            had recent activity. It will be closed if no further activity occurs.
          stale-pr-message: >
            This pull request has been automatically marked as stale because it
            has not had recent activity. It will be closed if no further activity
            occurs.
          close-issue-message: >
            This issue was closed because it has been inactive for 14 days since
            being marked as stale.
          close-pr-message: >
            This pull request was closed because it has been inactive for 14
            days since being marked as stale.
          days-before-issue-stale: 60
          days-before-pr-stale: 60
          days-before-issue-close: 14
          days-before-pr-close: 14
          stale-issue-label: "stale"
          stale-pr-label: "stale"
          exempt-issue-labels: "bug,security"
          exempt-pr-labels: "bug,security"
