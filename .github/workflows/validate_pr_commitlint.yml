---
# @description: Validates commit messages use Conventional Commits format on pull requests
# @owner: @dencelkbabu
# @sla: Best-effort (no uptime guarantee)
# @cost-center: Validation
name: "Validate: Conventional Commits (PR Gate)"

on:
  pull_request:
    branches: [dev, 'release/**', 'hotfix/**']
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: commitlint-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  commitlint:
    name: Validate Commit Messages
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    if: github.event.pull_request.draft == false && github.actor != 'dependabot[bot]'
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate all commits in PR
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
