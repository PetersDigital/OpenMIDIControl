---
# @description: CI pipeline for feature branches with analysis and testing only (no builds)
# @owner: @dencelkbabu
# @sla: Best-effort (no uptime guarantee)
# @cost-center: CI/CD
name: "CI: Feature Branch"

on:
  push:
    branches:
      - '**'
      - '!main'
      - '!dev'
      - '!beta'
      - '!rc'
    paths:
      - 'app/**'
      - '.github/**'
      - 'scripts/**'
      - 'pubspec.yaml'
      - '!**.md'
      - '!docs/**'

concurrency:
  group: feature-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze-and-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: 'CI: Runner CI Core'
        id: core
        uses: ./.github/actions/flutter-ci-core
        with:
          working-directory: app
