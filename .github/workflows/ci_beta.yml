# @description: Builds release candidates on beta branch with signing, provenance, and draft GitHub releases
# @owner: @dencelkbabu
# @sla: Best-effort (no uptime guarantee)
# @cost-center: CI/CD
name: "CI: Beta Branch"

on:
  push:
    branches: [beta]
    paths:
      - 'app/**'
      - '.github/**'
      - 'scripts/**'
      - 'pubspec.yaml'
    paths-ignore:
      - '**.md'
      - 'docs/**'

concurrency:
  group: beta-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  analyze-and-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: 'CI: Runner CI Core'
        id: core
        uses: ./.github/actions/flutter-ci-core
        with:
          working-directory: app
          telegram-token: ${{ secrets.TELEGRAM_TOKEN }}
          telegram-chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}

  build-rc:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs: analyze-and-test
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
      id-token: write
    outputs:
      has_windows: ${{ steps.check_windows.outputs.has_windows }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check Windows Support
        id: check_windows
        run: |
          if [ -d "app/windows" ]; then
            echo "has_windows=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_windows=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Beta Tag
        id: tag
        run: |
          # Get latest production tag
          LATEST_TAG=$(git describe --tags --match='v[0-9]*.[0-9]*.[0-9]*' --abbrev=0 2>/dev/null || echo "v0.0.0")
          
          # Extract version components
          VERSION=$(echo "$LATEST_TAG" | sed 's/^v//')
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          
          # Get commit count since last tag for beta increment
          BETA_NUM=$(git rev-list --count "$LATEST_TAG"..HEAD)
          if [ "$BETA_NUM" -eq 0 ]; then
            BETA_NUM=1
          fi
          
          # Create beta tag
          BETA_TAG="v${MAJOR}.${MINOR}.${PATCH}-beta.${BETA_NUM}"
          
          echo "beta-tag=$BETA_TAG" >> "$GITHUB_OUTPUT"
          echo "Generated beta tag: $BETA_TAG"

      - name: Build Android APK
        id: build_android
        uses: ./.github/actions/flutter-build-android
        with:
          working-directory: app
          keystore-base64: ${{ secrets.KEYSTORE_BASE64 }}
          key-password: ${{ secrets.KEY_PASSWORD }}
          key-alias: ${{ secrets.KEY_ALIAS }}
          store-password: ${{ secrets.STORE_PASSWORD }}
          build-type: release
          artifact-name: openmidicontrol-${{ steps.tag.outputs.beta-tag }}-android

      - name: Install Cosign
        uses: sigstore/cosign-installer@dc72c7d5f4d10eb51bdefcf97cb667f4020117b4 # v3.5.0

      - name: 'CD: Cosign Sign and Verify'
        uses: ./.github/actions/cosign-sign-verify
        with:
          artifact_path: ${{ steps.build_android.outputs.apk-path }}
          repository: ${{ github.repository }}

      - uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.6.0
        with:
          name: android-apk
          retention-days: 1
          path: |
            ${{ steps.build_android.outputs.apk-path }}
            ${{ steps.build_android.outputs.apk-path }}.sig
            ${{ steps.build_android.outputs.apk-path }}.pem

      - name: Build Windows ZIP
        id: build_windows
        if: steps.check_windows.outputs.has_windows == 'true'
        uses: ./.github/actions/flutter-build-windows
        with:
          working-directory: app
          build-type: release
          artifact-name: openmidicontrol-${{ steps.tag.outputs.beta-tag }}-windows

      - name: 'CD: Cosign Sign and Verify (Windows)'
        if: steps.check_windows.outputs.has_windows == 'true'
        uses: ./.github/actions/cosign-sign-verify
        with:
          artifact_path: ${{ steps.build_windows.outputs.zip-path }}
          repository: ${{ github.repository }}

      - uses: actions/upload-artifact@6f51ac03b9356f520e9adb1b1b7802705f340c2b # v4.6.0
        if: steps.check_windows.outputs.has_windows == 'true'
        with:
          name: windows-build
          retention-days: 1
          path: |
            ${{ steps.build_windows.outputs.zip-path }}
            ${{ steps.build_windows.outputs.zip-path }}.sig
            ${{ steps.build_windows.outputs.zip-path }}.pem

  provenance:
    needs: [analyze-and-test, build-rc]
    timeout-minutes: 10
    if: always() && needs.build-rc.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Artifacts
        uses: ./.github/actions/download-and-prepare-artifacts

      - name: Generate Provenance (Android)
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.0
        with:
          subject-path: openmidicontrol-*-android.apk

      - name: Generate Provenance (Windows)
        if: needs.build-rc.outputs.has_windows == 'true'
        uses: actions/attest-build-provenance@c074443f1aee8d4aeeae555aebba3282517141b2 # v2.2.0
        with:
          subject-path: openmidicontrol-*-windows.zip

  create-draft-release:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs: [analyze-and-test, build-rc, provenance]
    if: always() && needs.build-rc.result == 'success' && needs.provenance.result == 'success'
    permissions:
      contents: write
    outputs:
      beta-tag: ${{ steps.tag.outputs.beta-tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Artifacts
        uses: ./.github/actions/download-and-prepare-artifacts

      - name: Generate Beta Tag (repeat)
        id: tag
        run: |
          LATEST_TAG=$(git describe --tags --match='v[0-9]*.[0-9]*.[0-9]*' --abbrev=0 2>/dev/null || echo "v0.0.0")
          VERSION=$(echo "$LATEST_TAG" | sed 's/^v//')
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          BETA_NUM=$(git rev-list --count "$LATEST_TAG"..HEAD)
          if [ "$BETA_NUM" -eq 0 ]; then
            BETA_NUM=1
          fi
          BETA_TAG="v${MAJOR}.${MINOR}.${PATCH}-beta.${BETA_NUM}"
          echo "beta-tag=$BETA_TAG" >> "$GITHUB_OUTPUT"

      - name: Generate Release Notes
        uses: ./.github/actions/generate-release-notes
        with:
          tag: ${{ steps.tag.outputs.beta-tag }}
          changelog-path: CHANGELOG.md
          include-metadata: 'true'
          commit-hash: ${{ github.sha }}
          triggered-by: ${{ github.actor }}

      - name: Create Draft Release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          tag_name: ${{ steps.tag.outputs.beta-tag }}
          name: ${{ steps.tag.outputs.beta-tag }} - Release Candidate
          body_path: release_notes.md
          draft: true
          prerelease: true
          files: |
            openmidicontrol-*-android.apk
            openmidicontrol-*-android.apk.sig
            openmidicontrol-*-android.apk.pem
            openmidicontrol-*-windows.zip
            openmidicontrol-*-windows.zip.sig
            openmidicontrol-*-windows.zip.pem
            *.jsonl

  notify-telegram:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [analyze-and-test, build-rc, create-draft-release]
    if: always() && needs.build-rc.result == 'success'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Notify Telegram (RC Build)
        uses: ./.github/actions/notify-telegram
        with:
          telegram-token: ${{ secrets.TELEGRAM_TOKEN }}
          telegram-chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          notification-type: rc-build
          branch: ${{ github.ref_name }}
          tag: ${{ needs.create-draft-release.outputs.beta-tag }}
          status: ${{ needs.build-rc.result }}
