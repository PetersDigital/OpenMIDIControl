---
# @description: Manual production rebuild for existing tags with force overwrite capability
# @owner: @dencelkbabu
# @sla: Best-effort (no uptime guarantee)
# @cost-center: CI/CD
name: "CD: Manual Production Rebuild"

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to rebuild (e.g., v1.0.2)"
        required: true
        type: string
      force:
        description: "Force overwrite existing release assets"
        required: false
        default: false
        type: boolean

concurrency:
  group: release-manual-${{ github.workflow }}-${{ inputs.tag || github.ref_name }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  validate-tag:
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    outputs:
      tag_commit: ${{ steps.validate.outputs.commit }}
      tag: ${{ steps.validate.outputs.tag }}
      has_windows: ${{ steps.validate.outputs.has_windows }}
    steps:
      - name: Checkout Repository (workflow engine code)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          fetch-tags: true

      - name: 'CD: Release Tag Validation'
        id: validate
        uses: ./.github/actions/release-tag-validation
        with:
          tag: ${{ github.event.inputs.tag }}
          allowed_actors: ${{ vars.ALLOWED_RELEASE_ACTORS }}
          gpg_public_key: ${{ secrets.GPG_PUBLIC_KEY }}
          expected_fingerprint: ${{ secrets.EXPECTED_GPG_FINGERPRINT }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          main_branch: main

  analyze-and-test:
    needs: validate-tag
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate-tag.outputs.tag_commit }}
          fetch-depth: 1

      - name: Restore modern CI actions from main
        shell: bash
        working-directory: .
        run: |
          # Fetch the latest main branch from origin
          git fetch origin main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove any existing .github/actions (from old tags)
          rm -rf .github/actions

          # Checkout the .github/actions directory directly from the fetched main branch
          git checkout FETCH_HEAD -- .github/actions || {
            echo "::error::Failed to checkout .github/actions from main branch"
            exit 1
          }

          # Verify actions were restored
          if [ ! -d ".github/actions" ] || [ -z "$(ls -A .github/actions)" ]; then
            echo "::error::.github/actions is empty or missing"
            exit 1
          fi

      - name: 'CD: Runner CI Core'
        id: core
        uses: ./.github/actions/flutter-ci-core
        with:
          working-directory: app
          telegram-token: ${{ secrets.TELEGRAM_TOKEN }}
          telegram-chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}

  build-android:
    needs: [validate-tag, analyze-and-test]
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate-tag.outputs.tag_commit }}

      - name: Restore modern CI actions from main
        shell: bash
        working-directory: .
        run: |
          # Fetch the latest main branch from origin
          git fetch origin main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove any existing .github/actions (from old tags)
          rm -rf .github/actions

          # Checkout the .github/actions directory directly from the fetched main branch
          git checkout FETCH_HEAD -- .github/actions || {
            echo "::error::Failed to checkout .github/actions from main branch"
            exit 1
          }

          # Verify actions were restored
          if [ ! -d ".github/actions" ] || [ -z "$(ls -A .github/actions)" ]; then
            echo "::error::.github/actions is empty or missing"
            exit 1
          fi

      - name: Build Android APK
        id: build
        uses: ./.github/actions/flutter-build-android
        with:
          working-directory: app
          keystore-base64: ${{ secrets.KEYSTORE_BASE64 }}
          key-password: ${{ secrets.KEY_PASSWORD }}
          key-alias: ${{ secrets.KEY_ALIAS }}
          store-password: ${{ secrets.STORE_PASSWORD }}
          build-type: release
          artifact-name: openmidicontrol-${{ needs.validate-tag.outputs.tag }}-android

      - name: Confirm APK exists
        run: |
          ARTIFACT=${{ steps.build.outputs.apk-path }}
          echo "Expected APK path: $ARTIFACT"
          ls -la build/app/outputs/flutter-apk
          if [ ! -f "$ARTIFACT" ]; then
            echo "::error::APK not found: $ARTIFACT"
            exit 1
          fi

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: 'CD: Cosign Sign and Verify'
        uses: ./.github/actions/cosign-sign-verify
        with:
          artifact_path: ${{ steps.build.outputs.apk-path }}
          repository: ${{ github.repository }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: android-apk
          retention-days: 1
          path: |
            ${{ steps.build.outputs.apk-path }}
            ${{ steps.build.outputs.apk-path }}.sig
            ${{ steps.build.outputs.apk-path }}.pem

  build-windows:
    needs: [validate-tag, analyze-and-test]
    if: needs.validate-tag.outputs.has_windows == 'true'
    runs-on: windows-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate-tag.outputs.tag_commit }}

      - name: Restore modern CI actions from main
        shell: bash
        working-directory: .
        run: |
          # Fetch the latest main branch from origin
          git fetch origin main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove any existing .github/actions (from old tags)
          rm -rf .github/actions

          # Checkout the .github/actions directory directly from the fetched main branch
          git checkout FETCH_HEAD -- .github/actions || {
            echo "::error::Failed to checkout .github/actions from main branch"
            exit 1
          }

          # Verify actions were restored
          if [ ! -d ".github/actions" ] || [ -z "$(ls -A .github/actions)" ]; then
            echo "::error::.github/actions is empty or missing"
            exit 1
          fi

      - name: Build Windows ZIP
        id: build
        uses: ./.github/actions/flutter-build-windows
        with:
          working-directory: app
          build-type: release
          artifact-name: openmidicontrol-${{ needs.validate-tag.outputs.tag }}-windows

      - name: Install Cosign
        uses: sigstore/cosign-installer@cad07c2e89fa2edd6e2d7bab4c1aa38e53f76003 # v4.1.1

      - name: 'CD: Cosign Sign and Verify'
        uses: ./.github/actions/cosign-sign-verify
        with:
          artifact_path: ${{ steps.build.outputs.zip-path }}
          repository: ${{ github.repository }}

      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: windows-build
          retention-days: 1
          path: |
            ${{ steps.build.outputs.zip-path }}
            ${{ steps.build.outputs.zip-path }}.sig
            ${{ steps.build.outputs.zip-path }}.pem

  provenance:
    needs: [validate-tag, build-android, build-windows]
    timeout-minutes: 10
    if: |
      always() &&
      needs.build-android.result == 'success' &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped')
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Restore modern CI actions from main
        shell: bash
        working-directory: .
        run: |
          # Fetch the latest main branch from origin
          git fetch origin main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove any existing .github/actions (from old tags)
          rm -rf .github/actions

          # Checkout the .github/actions directory directly from the fetched main branch
          git checkout FETCH_HEAD -- .github/actions || {
            echo "::error::Failed to checkout .github/actions from main branch"
            exit 1
          }

          # Verify actions were restored
          if [ ! -d ".github/actions" ] || [ -z "$(ls -A .github/actions)" ]; then
            echo "::error::.github/actions is empty or missing"
            exit 1
          fi

      - name: Download Artifacts
        uses: ./.github/actions/download-and-prepare-artifacts

      - name: Generate Provenance (Android)
        uses: ./.github/actions/provenance-attestation
        with:
          subject_path: openmidicontrol-*-android.apk

      - name: Generate Provenance (Windows)
        if: needs.build-windows.result == 'success'
        uses: ./.github/actions/provenance-attestation
        with:
          subject_path: openmidicontrol-*-windows.zip

  publish-release:
    needs: [validate-tag, build-android, build-windows, provenance]
    timeout-minutes: 15
    if: |
      always() &&
      needs.build-android.result == 'success' &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') &&
      needs.provenance.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate-tag.outputs.tag_commit }}

      - name: Restore modern CI actions from main
        shell: bash
        working-directory: .
        run: |
          # Fetch the latest main branch from origin
          git fetch origin main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove any existing .github/actions (from old tags)
          rm -rf .github/actions

          # Checkout the .github/actions directory directly from the fetched main branch
          git checkout FETCH_HEAD -- .github/actions || {
            echo "::error::Failed to checkout .github/actions from main branch"
            exit 1
          }

          # Verify actions were restored
          if [ ! -d ".github/actions" ] || [ -z "$(ls -A .github/actions)" ]; then
            echo "::error::.github/actions is empty or missing"
            exit 1
          fi

      - name: Download Artifacts
        uses: ./.github/actions/download-and-prepare-artifacts

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded files ==="
          ls -la
          echo "========================"

      - name: Ensure GitHub CLI
        if: github.event.inputs.force == 'true'
        run: |
          if ! command -v gh &> /dev/null; then
            sudo apt-get update && sudo apt-get install gh -y
          fi

      - name: Delete existing assets (if forcing overwrite)
        if: github.event.inputs.force == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ needs.validate-tag.outputs.tag }}"
          gh release delete-asset "$TAG" "openmidicontrol-${TAG}-android.apk" --yes || true
          gh release delete-asset "$TAG" "openmidicontrol-${TAG}-android.apk.sig" --yes || true
          gh release delete-asset "$TAG" "openmidicontrol-${TAG}-android.apk.pem" --yes || true

          if [ "${{ needs.validate-tag.outputs.has_windows }}" = "true" ]; then
            gh release delete-asset "$TAG" "openmidicontrol-${TAG}-windows.zip" --yes || true
            gh release delete-asset "$TAG" "openmidicontrol-${TAG}-windows.zip.sig" --yes || true
            gh release delete-asset "$TAG" "openmidicontrol-${TAG}-windows.zip.pem" --yes || true
          fi
          gh release delete-asset "$TAG" "*.jsonl" --yes || true

      - name: Generate Release Notes
        uses: ./.github/actions/generate-release-notes
        with:
          tag: ${{ needs.validate-tag.outputs.tag }}
          changelog-path: CHANGELOG.md
          include-metadata: 'true'
          commit-hash: ${{ needs.validate-tag.outputs.tag_commit }}
          triggered-by: ${{ github.actor }}

      - name: Prepare release assets list
        id: assets
        run: |
          TAG="${{ needs.validate-tag.outputs.tag }}"

          echo "=== Generating Asset List ==="
          {
            echo "files<<EOF"
            # Android APK and signatures
            for ext in apk apk.sig apk.pem; do
              FILE="openmidicontrol-${TAG}-android.${ext}"
              if [ -f "$FILE" ]; then
                echo "$FILE"
              else
                echo "::warning::File not found: $FILE" >&2
              fi
            done

            # Windows ZIP and signatures (if exists)
            if [ "${{ needs.validate-tag.outputs.has_windows }}" = "true" ]; then
              for ext in zip zip.sig zip.pem; do
                FILE="openmidicontrol-${TAG}-windows.${ext}"
                if [ -f "$FILE" ]; then
                  echo "$FILE"
                else
                  echo "::warning::File not found: $FILE" >&2
                fi
              done
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # Log findings to runner console for debugging
          echo "Assets to be uploaded:"
          ls -la -- openmidicontrol-"${TAG}"-* 2>/dev/null || echo "No matching assets found in local directory."

      - name: Update GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          tag_name: ${{ needs.validate-tag.outputs.tag }}
          body_path: release_notes.md
          draft: false
          files: ${{ steps.assets.outputs.files }}

  notify-release:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [validate-tag, publish-release]
    if: always()
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Restore modern CI actions from main
        shell: bash
        working-directory: .
        run: |
          # Fetch the latest main branch from origin
          git fetch origin main
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Remove any existing .github/actions (from old tags)
          rm -rf .github/actions

          # Checkout the .github/actions directory directly from the fetched main branch
          git checkout FETCH_HEAD -- .github/actions || {
            echo "::error::Failed to checkout .github/actions from main branch"
            exit 1
          }

          # Verify actions were restored
          if [ ! -d ".github/actions" ] || [ -z "$(ls -A .github/actions)" ]; then
            echo "::error::.github/actions is empty or missing"
            exit 1
          fi

      - name: Notify Telegram
        uses: ./.github/actions/notify-telegram
        with:
          telegram-token: ${{ secrets.TELEGRAM_TOKEN }}
          telegram-chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          notification-type: release
          tag: ${{ needs.validate-tag.outputs.tag }}
          status: ${{ needs.publish-release.result }}
