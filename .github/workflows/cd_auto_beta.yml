---
# @description: Builds release candidates on beta branch with signing, provenance, and draft GitHub releases
# @owner: @dencelkbabu
# @sla: Best-effort (no uptime guarantee)
# @cost-center: CI/CD
name: "CD: Auto Beta Branch"

on:
  push:
    branches: [beta]
    paths:
      - 'app/**'
      - '.github/**'
      - 'scripts/**'
      - 'pubspec.yaml'
      - '!**.md'
      - '!docs/**'

concurrency:
  group: beta-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  analyze-and-test:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    if: github.actor != 'dependabot[bot]'
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
      - name: 'CI: Runner CI Core'
        id: core
        uses: ./.github/actions/flutter-ci-core
        with:
          working-directory: app
          telegram-token: ${{ secrets.TELEGRAM_TOKEN }}
          telegram-chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          notify-on-failure: 'false'

  build-beta:
    runs-on: ubuntu-22.04
    timeout-minutes: 20
    needs: [analyze-and-test]
    if: github.actor != 'dependabot[bot]' && needs.analyze-and-test.result == 'success'
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
      id-token: write
    outputs:
      has_windows: ${{ steps.check_windows.outputs.has_windows }}
      beta-tag: ${{ steps.tag.outputs.prerelease-tag }}
      from-ref: ${{ steps.tag.outputs.from-ref }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Check Windows Support
        id: check_windows
        run: |
          if [ -d "windows" ]; then
            echo "has_windows=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_windows=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate Beta Tag
        id: tag
        uses: ./.github/actions/generate-prerelease-tag
        with:
          prerelease-type: beta

      - name: Build Android APK
        id: build_android
        uses: ./.github/actions/flutter-build-android
        with:
          working-directory: app
          keystore-base64: ${{ secrets.KEYSTORE_BASE64 }}
          key-password: ${{ secrets.KEY_PASSWORD }}
          key-alias: ${{ secrets.KEY_ALIAS }}
          store-password: ${{ secrets.STORE_PASSWORD }}
          build-type: release
          artifact-name: openmidicontrol-${{ steps.tag.outputs.prerelease-tag }}-android

      - name: Install Cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0

      - name: 'CD: Cosign Sign and Verify'
        uses: ./.github/actions/cosign-sign-verify
        with:
          artifact_path: ${{ steps.build_android.outputs.apk-path }}
          repository: ${{ github.repository }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: android-apk
          retention-days: 1
          path: |
            ${{ steps.build_android.outputs.apk-path }}
            ${{ steps.build_android.outputs.apk-path }}.sig
            ${{ steps.build_android.outputs.apk-path }}.pem

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    needs: [analyze-and-test, build-beta]
    if: always() && needs.build-beta.result == 'success' && needs.build-beta.outputs.has_windows == 'true'
    defaults:
      run:
        working-directory: app
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Build Windows ZIP
        id: build_windows
        uses: ./.github/actions/flutter-build-windows
        with:
          working-directory: app
          build-type: release
          artifact-name: openmidicontrol-${{ needs.build-beta.outputs.beta-tag }}-windows

      - name: Install Cosign
        uses: sigstore/cosign-installer@59acb6260d9c0ba8f4a2f9d9b48431a222b68e20 # v3.5.0

      - name: 'CD: Cosign Sign and Verify (Windows)'
        uses: ./.github/actions/cosign-sign-verify
        with:
          artifact_path: ${{ steps.build_windows.outputs.zip-path }}
          repository: ${{ github.repository }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: windows-build
          retention-days: 1
          path: |
            ${{ steps.build_windows.outputs.zip-path }}
            ${{ steps.build_windows.outputs.zip-path }}.sig
            ${{ steps.build_windows.outputs.zip-path }}.pem

  provenance:
    needs: [analyze-and-test, build-beta, build-windows]
    timeout-minutes: 10
    if: always() && needs.build-beta.result == 'success'
    runs-on: ubuntu-22.04
    permissions:
      id-token: write
      contents: read
      attestations: write
      artifact-metadata: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download Artifacts
        uses: ./.github/actions/download-and-prepare-artifacts

      - name: Generate Provenance (Android)
        uses: ./.github/actions/provenance-attestation
        with:
          subject_path: openmidicontrol-*-android.apk

      - name: Generate Provenance (Windows)
        if: needs.build-beta.outputs.has_windows == 'true'
        uses: ./.github/actions/provenance-attestation
        with:
          subject_path: openmidicontrol-*-windows.zip

  create-draft-release:
    runs-on: ubuntu-22.04
    timeout-minutes: 15
    needs:
      [analyze-and-test, build-beta, build-windows, provenance]
    if: >-
      always() &&
      needs.build-beta.result == 'success' &&
      (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') &&
      needs.provenance.result == 'success'
    permissions:
      contents: write
    outputs:
      beta-tag: ${{ needs.build-beta.outputs.beta-tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download Artifacts
        uses: ./.github/actions/download-and-prepare-artifacts

      - name: Generate Release Notes
        uses: ./.github/actions/generate-release-notes
        with:
          tag: ${{ needs.build-beta.outputs.beta-tag }}
          from-ref: ${{ needs.build-beta.outputs.from-ref }}
          changelog-path: CHANGELOG.md
          include-metadata: 'true'
          commit-hash: ${{ github.sha }}
          triggered-by: ${{ github.actor }}

      - name: Verify release notes
        run: |
          echo "=== Release Notes Content ==="
          if [ -f release_notes.md ]; then
            cat release_notes.md
          else
            echo "::error::release_notes.md not found!"
            exit 1
          fi
          echo "==========================="

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded files ==="
          ls -la
          echo "========================"

      - name: Prepare release assets list
        id: assets
        uses: ./.github/actions/prepare-release-assets
        with:
          tag: ${{ needs.build-beta.outputs.beta-tag }}
          has-windows: ${{ needs.build-beta.outputs.has_windows }}

      - name: Create Draft Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          tag_name: ${{ needs.build-beta.outputs.beta-tag }}
          name: ${{ needs.build-beta.outputs.beta-tag }} - Beta Release
          body_path: release_notes.md
          draft: true
          prerelease: true
          files: ${{ steps.assets.outputs.files }}

  notify-telegram:
    runs-on: ubuntu-22.04
    timeout-minutes: 5
    needs: [build-beta, create-draft-release]
    if: always() && needs.build-beta.result == 'success' && needs.create-draft-release.result == 'success'
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Send Beta Notification
        uses: ./.github/actions/notify-telegram
        with:
          telegram-token: ${{ secrets.TELEGRAM_TOKEN }}
          telegram-chat-id: ${{ secrets.TELEGRAM_CHAT_ID }}
          notification-type: beta-build
          tag: ${{ needs.create-draft-release.outputs.beta-tag }}
          branch: ${{ github.ref_name }}
          commit: ${{ github.sha }}
          actor: ${{ github.actor }}
          status: success
          mode: enterprise
          notify-status: success-only
          notify-types-regex: '^(beta-build)$'
          notify-branches-regex: '^(beta)$'
          notify-tags-regex: '^v[0-9]+\.[0-9]+\.[0-9]+-beta\.[0-9]+$'
          environment: staging
          include-details-on-success: true
          fail-on-error: false
