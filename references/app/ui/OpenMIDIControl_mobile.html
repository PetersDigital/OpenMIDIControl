<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>OpenMIDIControl - Ethereal Console</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&amp;family=Inter:wght@400;500;700&amp;family=Ibm+Plex+Sans:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "on-error": "#690005",
                        "on-secondary-fixed": "#101c2b",
                        "error-container": "#93000a",
                        "on-secondary-fixed-variant": "#3b4859",
                        "on-primary-fixed-variant": "#234870",
                        "on-tertiary-fixed-variant": "#204e4d",
                        "surface-variant": "#333539",
                        "secondary-container": "#3b4859",
                        "surface-container-low": "#1a1c20",
                        error: "#ffb4ab",
                        "on-primary-container": "#30547d",
                        "on-primary-fixed": "#001c37",
                        "tertiary-container": "#a1cfce",
                        "surface-bright": "#37393e",
                        "secondary-fixed": "#d6e3f9",
                        surface: "#111318",
                        "on-surface-variant": "#c3c6cf",
                        "on-primary": "#033258",
                        "tertiary-fixed-dim": "#a1cfce",
                        "inverse-on-surface": "#2f3035",
                        "on-tertiary-fixed": "#002020",
                        "primary-fixed": "#d2e4ff",
                        "primary-fixed-dim": "#a6c9f8",
                        "on-error-container": "#ffdad6",
                        "surface-tint": "#a6c9f8",
                        "tertiary-fixed": "#bdebea",
                        background: "#111318",
                        "surface-container-lowest": "#0c0e12",
                        "on-surface": "#e2e2e8",
                        "on-secondary": "#253141",
                        secondary: "#bbc7dc",
                        "on-secondary-container": "#a9b6ca",
                        "surface-container-highest": "#333539",
                        "secondary-fixed-dim": "#bbc7dc",
                        "surface-dim": "#111318",
                        "inverse-surface": "#e2e2e8",
                        primary: "#d2e4ff",
                        outline: "#8d9199",
                        tertiary: "#bdebea",
                        "on-tertiary": "#013737",
                        "inverse-primary": "#3d608a",
                        "on-tertiary-container": "#2d5959",
                        "surface-container": "#1e2024",
                        "on-background": "#e2e2e8",
                        "surface-container-high": "#282a2e",
                        "outline-variant": "#43474e",
                        "primary-container": "#a6c9f8"
                    },
                    fontFamily: {
                        headline: ["Manrope"],
                        body: ["Inter"],
                        label: ["Ibm Plex Sans"],
                        display: "Manrope"
                    },
                    borderRadius: {
                        DEFAULT: "0.25rem",
                        lg: "0.5rem",
                        xl: "0.75rem",
                        full: "9999px"
                    }
                }
            }
        };
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            min-height: 100dvh;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body selection:bg-primary/30 overflow-hidden h-screen flex flex-col">
<!-- TopAppBar -->
<header class="bg-[#0d131e] flex justify-between items-center w-full px-6 py-4 z-10 shrink-0">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#a6c9f8]" data-icon="settings_input_component">settings_input_component</span>
<h1 class="text-xl font-black text-[#a6c9f8] tracking-tighter uppercase">OpenMIDI</h1>
</div>
<div class="flex items-center gap-4">
<span class="text-[10px] uppercase font-inter tracking-widest text-[#a6c9f8] font-bold">Connected</span>
<span class="material-symbols-outlined text-[#c3c7ca]" data-icon="more_vert">more_vert</span>
</div>
</header>
<main class="flex-grow flex flex-col overflow-hidden">
<!-- Command Center (Scaled to 30% of main) -->
<section class="h-[30%] flex flex-col bg-surface-container-low shrink-0 overflow-hidden">
<!-- Unified Status & Track -->
<div class="px-6 py-2 grid grid-cols-3 items-center gap-2 shrink-0">
<div class="space-y-0 text-left">
<span class="text-[8px] uppercase font-inter tracking-widest text-on-surface-variant block opacity-60">Tempo</span>
<div class="text-[12px] font-bold font-headline text-on-surface leading-tight">120 <span class="text-[8px] font-medium text-on-surface-variant">BPM</span></div>
</div>
<div class="text-center px-1">
<span class="text-[8px] uppercase font-inter tracking-widest text-on-surface-variant block opacity-60">Track</span>
<h2 class="text-[12px] font-bold font-headline tracking-tight text-[#a6c9f8] leading-tight line-clamp-1">01 - Cinematic Violins</h2>
</div>
<div class="text-right space-y-0">
<span class="text-[8px] uppercase font-inter tracking-widest text-on-surface-variant block opacity-60">Timecode</span>
<div class="text-[12px] font-bold font-headline text-on-surface leading-tight">001:01:000</div>
</div>
</div>
<!-- 3x3 Control Grid -->
<div class="flex-grow grid grid-cols-3 grid-rows-3 bg-background">
<!-- Row 1 -->
<button class="bg-surface-container border-[0.5px] border-background/20 flex items-center justify-center active:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-2xl text-on-surface-variant">fast_rewind</span>
</button>
<button class="bg-surface-container-high border-[0.5px] border-background/20 flex items-center justify-center active:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-2xl text-on-surface-variant">keyboard_arrow_up</span>
</button>
<button class="bg-[#ffb59e] border-[0.5px] border-background/20 flex flex-col items-center justify-center active:brightness-110 transition-all shadow-[inset_0_0_20px_rgba(255,181,158,0.4)]">
<span class="material-symbols-outlined text-2xl text-[#690005]" style="font-variation-settings: 'FILL' 1;">fiber_manual_record</span>
</button>
<!-- Row 2 -->
<button class="bg-surface-container-high border-[0.5px] border-background/20 flex items-center justify-center active:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-2xl text-on-surface-variant">keyboard_arrow_left</span>
</button>
<button class="bg-surface-container-highest border-[0.5px] border-background/20 flex items-center justify-center active:bg-primary/20 transition-colors">
<span class="material-symbols-outlined text-3xl text-white">stop</span>
</button>
<button class="bg-surface-container-high border-[0.5px] border-background/20 flex items-center justify-center active:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-2xl text-on-surface-variant">keyboard_arrow_right</span>
</button>
<!-- Row 3 -->
<button class="bg-surface-container border-[0.5px] border-background/20 flex items-center justify-center active:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-2xl text-on-surface-variant">fast_forward</span>
</button>
<button class="bg-surface-container-high border-[0.5px] border-background/20 flex items-center justify-center active:bg-surface-container-highest transition-colors">
<span class="material-symbols-outlined text-2xl text-on-surface-variant">keyboard_arrow_down</span>
</button>
<button class="bg-[#a6c9f8] border-[0.5px] border-background/20 flex items-center justify-center active:brightness-110 transition-all shadow-[inset_0_0_20px_rgba(166,201,248,0.4)]">
<span class="material-symbols-outlined text-3xl text-[#033258]">play_pause</span>
</button>
</div>
</section>
<!-- Performance Zone (Expanded to 70% of main) -->
<section class="h-[70%] bg-surface flex gap-2 p-2 relative">
<!-- CC1 Dynamics Fader -->
<div class="flex-1 flex flex-col h-full bg-surface-container-lowest overflow-hidden relative rounded-md">
<!-- Fader Ribbon (Full height container for max resolution) -->
<div class="absolute inset-0 flex flex-col justify-end">
<div class="w-full h-[85%] bg-[#a6c9f8] rounded-t-sm flex flex-col items-center justify-end pb-8">
<!-- Labels moved inside ribbon -->
<span class="text-[9px] font-bold font-inter uppercase tracking-widest text-[#033258] opacity-80 mb-1">CC1 Dynamics</span>
<span class="text-4xl font-black font-headline text-[#033258] tracking-tighter leading-none">127</span>
</div>
</div>
</div>
<!-- CC11 Expression Fader -->
<div class="flex-1 flex flex-col h-full bg-surface-container-lowest overflow-hidden relative rounded-md">
<!-- Fader Ribbon (Full height container for max resolution) -->
<div class="absolute inset-0 flex flex-col justify-end">
<div class="w-full h-[65%] bg-[#a1cfce] rounded-t-sm flex flex-col items-center justify-end pb-8">
<!-- Labels moved inside ribbon -->
<span class="text-[9px] font-bold font-inter uppercase tracking-widest text-[#013737] opacity-80 mb-1">CC11 Expression</span>
<span class="text-4xl font-black font-headline text-[#013737] tracking-tighter leading-none">098</span>
</div>
</div>
</div>
</section>
</main>
<!-- Content Mask Overlay -->
<div class="fixed top-0 left-0 w-full h-screen pointer-events-none ring-1 ring-inset ring-white/5 rounded-none z-[100]"></div>
</body></html>
