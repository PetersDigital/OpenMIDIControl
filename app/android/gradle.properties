# Project-local Java toolchain requirement.
# This repo targets JDK 21 for Android compilation via Gradle toolchains,
# while the rest of the system can still use JDK 17 for other projects.
# Prefer a local JDK 21 install on Windows to avoid Gradle provisioning/cache issues.
org.gradle.java.installations.auto-download=true
org.gradle.jvmargs=-Xmx8G -XX:MaxMetaspaceSize=4G -XX:ReservedCodeCacheSize=512m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
